version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://quicksend:quicksend@db:5432/quicksend
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: https://quicksend.com
      LOG_LEVEL: info
      BACKUP_DIR: /app/backups
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backups:/app/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quicksend
      POSTGRES_PASSWORD: quicksend
      POSTGRES_DB: quicksend
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quicksend"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  backups:
