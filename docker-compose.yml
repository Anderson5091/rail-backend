version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quicksend
      POSTGRES_PASSWORD: quicksend
      POSTGRES_DB: quicksend
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quicksend"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./QuickSend-Backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://quicksend:quicksend@db:5432/quicksend
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 7d
      CORS_ORIGIN: https://quicksend.com
      LOG_LEVEL: info
      BACKUP_DIR: /app/backups
      REDIS_URL: redis://redis:6379
      CROSSMINT_API_KEY: ${CROSSMINT_API_KEY:-}
      CROSSMINT_BASE_URL: ${CROSSMINT_BASE_URL:-}
      TREASURY_SIGNER_SECRET: ${TREASURY_SIGNER_SECRET:-}
      TREASURY_RECOVERY_SECRET: ${TREASURY_RECOVERY_SECRET:-}
      WALLET_SIGNER_SECRET: ${WALLET_SIGNER_SECRET:-}
      WALLET_RECOVERY_SECRET: ${WALLET_RECOVERY_SECRET:-}
      USER_WALLET_CHAIN: ${USER_WALLET_CHAIN:-base}
      SUPPORTED_NETWORKS: ${SUPPORTED_NETWORKS:-BASE,ETHEREUM,SOLANA,POLYGON}
      NETWORK_CHAIN: ${NETWORK_CHAIN:-base,ethereum,solana,polygon}
      TREASURY_CHAIN: ${TREASURY_CHAIN:-base}
      HOT_TARGET: ${HOT_TARGET:-50000}
      HOT_THRESHOLD_MIN: ${HOT_THRESHOLD_MIN:-20000}
      HOT_REFILL_AMOUNT: ${HOT_REFILL_AMOUNT:-100000}
      WARM_TARGET: ${WARM_TARGET:-500000}
      WARM_THRESHOLD_MIN: ${WARM_THRESHOLD_MIN:-250000}
      WARM_REFILL_AMOUNT: ${WARM_REFILL_AMOUNT:-1000000}
      REFILL_INTERVAL: ${REFILL_INTERVAL:-60000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backups:/app/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ./QuickSend-Web
      dockerfile: Dockerfile
    restart: unless-stopped

  admin:
    build:
      context: ./QuickSend-Admin
      dockerfile: Dockerfile
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/ssl:ro
    depends_on:
      - api
      - web
      - admin
    restart: unless-stopped

volumes:
  pgdata:
  backups:
